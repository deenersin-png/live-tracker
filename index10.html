      h += '</span></div>';
    }
    h += paddleRowHtml(blk);
    h += leaderTimelineHtml(bus);
    return h + '</div></div>';
  }

  // Status & crowding no longer live here: status is on the main line above,
  // crowding moved down into the expandable "Leaders" line (see below).

  if (isLay) {
    const dur = fmtDuration(Date.now() - (bus._layoverSince || Date.now()));
    h += '<div class="layover-row"><span class="terminal-badge">AT TERMINAL</span>';
    h += '<span>Layover:</span>';
    h += '<span class="layover-timer" data-layover-since="' + (bus._layoverSince || 0) + '">' + dur + '</span>';
    if (bus._dueOutMin != null) {
      if (bus._overdueMin > 0) {
        h += '<span class="due-out overdue">OVERDUE ' + bus._overdueMin + 'm</span>';
      } else {
        h += '<span class="due-out">Due out ' + fmtClock(bus._dueOutMin) + '</span>';
      }
    } else if (bus._doneForDay) {
      h += '<span class="due-out">DONE FOR DAY</span>';
    }
    h += '</div>';
  }

  // My follower has overtaken me (red) — shown on the leader's card.
  if (bus._overtake) {
    h += '<div class="flag-row"><span class="flag-badge flag-follower">FOLLOWER ' +
         esc(bus._overtake.followerBlk) + ' &nbsp;Bus#: ' + esc(bus._overtake.followerBus) +
         ' &nbsp;~' + bus._overtake.overtakeMin + 'm AHEAD</span></div>';
  }
  // I have overtaken my leader (yellow) — shown on the follower's card.
  if (bus._passedLeader) {
    h += '<div class="flag-row"><span class="flag-badge flag-leader">LEADER ' +
         esc(bus._passedLeader.leaderBlk) + ' &nbsp;Bus#: ' + esc(bus._passedLeader.leaderBus) +
         ' &nbsp;~' + bus._passedLeader.overtakeMin + 'm BEHIND</span></div>';
  }

  // Only surface the SCHED LEADER row when something is actually notable — a
  // bus quietly following its scheduled leader in order needs no row. Notable
  // = it passed its leader (out of order), the leader has no live data / isn't
  // in service, or both this bus and its leader are sitting at the terminal.
  if (bus._schedLeaderBlk) {
    const sBlk   = bus._schedLeaderBlk;
    const sState = bus._schedLeaderState; // 'ahead' | 'not_due_yet' | 'done_for_day' | 'missing' | 'no_data' | 'behind'
    const leaderLay    = !!(bus._schedLeaderBus && bus._schedLeaderBus._isLayover);
    const bothTerminal = isLay && leaderLay;
    // 'behind' (you passed your leader) is now shown as the yellow LEADER
    // …BEHIND flag above (with minutes), so it's not a "notable" row here.
    const notable = sState === 'no_data' || sState === 'missing' || bothTerminal;
    if (notable) {
      // Real live vehicle number only — no block-number fallback (that showed a
      // misleading "Bus# <blocknum>" for leaders with no live data).
      const lvRaw = bus._schedLeaderBus ? String(bus._schedLeaderBus.VehicleID || '').trim() : '';
      const sVid  = lvRaw && lvRaw !== '0' ? lvRaw : null;
      h += '<div class="sched-leader-row">';
      h += '<span class="sched-leader-label">Scheduled leader</span>';
      h += '<span class="sched-leader-blk">' + esc(sBlk) + '</span>';
      if (sState === 'no_data' || sState === 'missing') {
        // Special case — no bus in service for the leader. Compact one-liner:
        // "Scheduled leader · <block> · Bus# n/a".
        h += '<span class="sched-leader-bus">Bus# n/a</span>';
      } else if (bothTerminal) {
        h += '<span class="sched-leader-bus">Bus# ' + (sVid ? esc(sVid) : '—') + '</span>';
        h += '<span class="sched-leader-notdue">BOTH AT TERMINAL</span>';
      }
      h += '</div>';
    }
  }

  h += passInfoHtml(bus);

  if (stop && !isLay) {
    h += '<div class="node-bottom"><span class="stop-name">→ ' + esc(stop) + '</span></div>';
  }

  h += paddleRowHtml(blk);
  h += leaderTimelineHtml(bus);
  return h + '</div></div>';
}

// Renders the past/current/next leader timeline for a card. Collapsed behind
// a tappable "Leaders ▾" toggle so it doesn't bloat every card by default.
function leaderTimelineHtml(bus) {
  const tl = bus._leaderTimeline;
  const isLive = !bus._scheduledOnly && !bus._isLayover;
  const hasTL  = !!(tl && (tl.past.length || tl.current || tl.next.length));
  const blk    = bus.BlockID || bus.label || '';

  // Left side of the Leaders line: run-number chips first, then crowding.
  const runChips = runChipsHtml(blk);
  const seat = seatInfo(bus.estimated_seat_availability);
  const seatHtml = (isLive && seat.show)
    ? '<span class="seat-tag ' + seat.c + '">' + ICONS.seat + ' ' + seat.t + '</span>' : '';

  // Nothing to show at all → render nothing.
  if (!hasTL && !seatHtml && !runChips) return '';

  const row = r =>
    '<div class="tl-row">' +
      '<span class="tl-dir">' + esc(r.dir) + '</span>' +
      '<span class="tl-time">' + fmtClock(r.start) + '</span>' +
      '<span class="tl-blk">Blk ' + esc(r.blk) + '</span>' +
      '<span class="tl-bus">Bus ' + esc(r.bus) + '</span>' +
      '<span class="tl-status">' + esc(r.status) + '</span>' +
    '</div>';
  let inner = '';
  if (hasTL) {
    if (tl.past.length)  inner += '<div class="tl-head">Past leaders</div>'    + tl.past.map(row).join('');
    if (tl.current)      inner += '<div class="tl-head">Current leader</div>'  + row(tl.current);
    if (tl.next.length)  inner += '<div class="tl-head">Next leaders</div>'    + tl.next.map(row).join('');
  } else {
    inner = '<div class="tl-head">No leader info</div>';
  }
  // Row: run chips + crowding on the left, "Leaders ▸" control on the right.
  // Only the control toggles the panel (see the delegated click handler).
  const isOpen = openLeaders.has(String(blk));
  return '<div class="leader-tl' + (isOpen ? ' open' : '') + '" data-lead-blk="' + esc(String(blk)) + '">' +
           '<div class="leader-sum">' + runChips + seatHtml +
             '<span class="lead-toggle" data-lead-toggle>Leaders <span class="arrow">▸</span></span>' +
           '</div>' +
           '<div class="leader-body' + (isOpen ? '' : ' hidden') + '">' + inner + '</div>' +
         '</div>';
}

// ── ALERTS / DETOURS ─────────────────────────────────────────
function renderAlerts(alerts) {
  const panel = document.getElementById('alertsPanel');
  const body  = document.getElementById('alertsBody');
  const msgs  = alerts
    .map(a => (a.customer_message || a.advisory_message || '').trim())
    .filter(Boolean);
  if (!msgs.length) { panel.classList.add('hidden'); return; }
  body.innerHTML = msgs.map(m => '<p>' + esc(m) + '</p>').join('');
  panel.classList.remove('hidden');
}

function renderDetours(detours) {
  const panel = document.getElementById('detoursPanel');
  const body  = document.getElementById('detoursBody');
  const msgs  = detours
    .map(d => (d.current_message || d.AdvisoryMessage || d.reason || '').trim())
    .filter(Boolean);
  if (!msgs.length) { panel.classList.add('hidden'); return; }
  body.innerHTML = msgs.map(m => '<p>' + esc(m) + '</p>').join('');
  panel.classList.remove('hidden');
}

function togglePanel(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── TIMERS ───────────────────────────────────────────────────
let refreshTimer = null;
let countdownTimer = null;
let layoverInterval = null;
let refreshSec = 30;

function startTimers() {
  clearInterval(refreshTimer);
  clearInterval(countdownTimer);
  refreshSec = 30;
  refreshTimer   = setInterval(tick, REFRESH_MS);
  countdownTimer = setInterval(() => {
    refreshSec = Math.max(0, refreshSec - 1);
    const el = document.getElementById('refreshTag');
    if (el) el.textContent = '↻ ' + refreshSec + 's';
  }, 1000);
}

function manageLayoverTimers() {
  const has = !!document.querySelector('[data-layover-since]');
  if (has && !layoverInterval) {
    layoverInterval = setInterval(() => {
      document.querySelectorAll('[data-layover-since]').forEach(el => {
        el.textContent = fmtDuration(Date.now() - parseInt(el.dataset.layoverSince));
      });
    }, 1000);
  } else if (!has && layoverInterval) {
    clearInterval(layoverInterval);
    layoverInterval = null;
  }
}

// ── SWIPEABLE DIRECTION PAGES ────────────────────────────────
// `#pagesTrack` is rebuilt from scratch on every render (setContent()
// replaces innerHTML), so the current page position is tracked here and
// reapplied after each render rather than living on the DOM.
let activePage = 0;

function updatePagesTransform() {
  const track = document.getElementById('pagesTrack');
  if (!track) return;
  const count = track.querySelectorAll('.page').length;
  if (activePage >= count) activePage = 0;
  track.style.transform = 'translateX(-' + (activePage * 100) + '%)';
  document.querySelectorAll('.page-dot').forEach((d, i) => d.classList.toggle('active', i === activePage));
}

function goToPage(i) {
  const track = document.getElementById('pagesTrack');
  if (!track) return;
  const count = track.querySelectorAll('.page').length;
  activePage = Math.max(0, Math.min(count - 1, i));
  updatePagesTransform();
}

// Event delegation on the stable #content wrapper (not the regenerated
// inner elements) so swipe/tap handling survives every re-render.
(function setupSwipe() {
  const content = document.getElementById('content');
  let startX = null, startY = null, dragging = false;

  content.addEventListener('touchstart', e => {
    if (!e.target.closest('.pages-wrap')) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragging = true;
  }, { passive: true });

  content.addEventListener('touchend', e => {
    if (!dragging) return;
    dragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // Require a mostly-horizontal swipe so vertical scrolling isn't hijacked.
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      goToPage(activePage + (dx < 0 ? 1 : -1));
    }
  }, { passive: true });

  // Tap-to-switch fallback for non-touch input (and easier automated testing).
  content.addEventListener('click', e => {
    const dot = e.target.closest('.page-dot');
    if (dot) { goToPage(parseInt(dot.dataset.page, 10)); return; }

    // Leaders expand/collapse — only the right-side "Leaders" control toggles
    // the panel; run chips (also on this line) fall through to open their PDF.
    const toggle = e.target.closest('[data-lead-toggle]');
    if (toggle) {
      const tl  = toggle.closest('.leader-tl');
      const blk = tl && tl.dataset.leadBlk;
      const body = tl && tl.querySelector('.leader-body');
      if (tl && body) {
        const nowOpen = body.classList.toggle('hidden') === false;
        tl.classList.toggle('open', nowOpen);
        if (blk) { if (nowOpen) openLeaders.add(blk); else openLeaders.delete(blk); }
      }
    }
  });
})();

// ── TICK ─────────────────────────────────────────────────────
let ticking = false;

async function tick() {
  if (ticking || !state.route) return;
  ticking = true;
  setStatus('syncing');
  try {
    const live = await fetchTV(state.route);
    updateCache(live, state.route);
    renderMain(annotateOvertake(annotateLayovers(mergeScheduledBlocks(mergeServerRecovery(mergeLiveAndCache(live, state.route)), live))), state.route);
    state.lastUpdate = new Date();
    refreshSec = 30;
    setStatus('live');
  } catch {
    if (state.lastUpdate) {
      setStatus('stale');
      showBanner('warn', '⚠', 'Network error — last update ' + state.lastUpdate.toLocaleTimeString());
    } else {
      setStatus('error');
      setContent('<div class="msg"><div class="icon">⚠️</div><div class="main">Could not reach SEPTA API</div><div class="sub">Check your connection and try again</div><button class="retry-btn" onclick="onRouteChange()">Retry</button></div>');
    }
  }
  ticking = false;
}

async function onRouteChange() {
  state.route = document.getElementById('routeSelect').value;
  if (!state.route) return;

  busCache.clear();
  resetPositionState(); // different route → fresh position numbers & pass flags
  openLeaders.clear();  // don't carry expanded Leaders panels onto a new route
  loadScheduleData(state.route);
  isFirstRender = true;
  lastHTML = '';
  activePage = 0; // a new route may have a different direction ordering/count
  try { localStorage.setItem('bt_route', state.route); } catch(e) {}

  document.getElementById('alertsPanel').classList.add('hidden');
  document.getElementById('detoursPanel').classList.add('hidden');
  document.getElementById('alertArea').innerHTML = '';
  setStatus('loading');
  setContent('<div class="msg"><div class="icon" style="animation:pulse 1s infinite">🔍</div><div class="main">Loading Route ' + esc(state.route) + '…</div></div>');
  startTimers();

  ticking = true;
  try {
    const [tvRes, alertsRes, detoursRes] = await Promise.allSettled([
      fetchTV(state.route),
      safeGetWithAliases(API.alerts,  state.route),
      safeGetWithAliases(API.detours, state.route),
    ]);

    if (tvRes.status === 'rejected') throw tvRes.reason;

    const live = tvRes.value;
    updateCache(live, state.route);
    renderMain(annotateOvertake(annotateLayovers(mergeScheduledBlocks(mergeServerRecovery(mergeLiveAndCache(live, state.route)), live))), state.route);
    state.lastUpdate = new Date();
    refreshSec = 30;
    setStatus('live');

    if (alertsRes.status  === 'fulfilled') renderAlerts(alertsRes.value);
    if (detoursRes.status === 'fulfilled') renderDetours(detoursRes.value);
  } catch {
    setStatus('error');
    setContent('<div class="msg"><div class="icon">⚠️</div><div class="main">Could not reach SEPTA API</div><div class="sub">Check your connection and try again</div><button class="retry-btn" onclick="onRouteChange()">Retry</button></div>');
  }
  ticking = false;
}

// ── HELPERS ──────────────────────────────────────────────────
function showBanner(type, icon, msg) {
  document.getElementById('alertArea').innerHTML =
    '<div class="alert-banner ' + type + '"><span class="alert-icon">' + icon + '</span>' + esc(msg) + '</div>';
}

function setStatus(s) {
  state.status = s;
  document.getElementById('statusDot').className  = 'live-dot ' + s;
  const t = { idle:'IDLE', loading:'LOADING', syncing:'SYNCING', offline:'OFFLINE', error:'ERROR',
    live:   state.lastUpdate ? 'LIVE · ' + state.lastUpdate.toLocaleTimeString() : 'LIVE',
    stale:  state.lastUpdate ? 'STALE · ' + state.lastUpdate.toLocaleTimeString() : 'STALE',
  };
  document.getElementById('statusText').textContent = t[s] || s.toUpperCase();
}

function fmtDuration(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return h + 'h ' + (m % 60) + 'm';
  if (m > 0) return m + 'm ' + (s % 60) + 's';
  return s + 's';
}

function fmtClock(min) {
  min = ((min % 1440) + 1440) % 1440;
  let h = Math.floor(min / 60), m = min % 60;
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if (h === 0) h = 12;
  return h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
}

function dirShort(d) {
  if (!d) return '—';
  const l = d.toLowerCase();
  if (l.includes('east'))  return 'EB';
  if (l.includes('west'))  return 'WB';
  if (l.includes('north')) return 'NB';
  if (l.includes('south')) return 'SB';
  return d.slice(0, 2).toUpperCase();
}

function seatInfo(v) {
  return ({
    MANY_SEATS_AVAILABLE:       { t:'Many Seats',   c:'many',     show:true  },
    FEW_SEATS_AVAILABLE:        { t:'Few Seats',    c:'few',      show:true  },
    STANDING_ROOM_ONLY:         { t:'Standing',     c:'standing', show:true  },
    CRUSHED_STANDING_ROOM_ONLY: { t:'Very Crowded', c:'full',     show:true  },
    FULL:                       { t:'Full',         c:'full',     show:true  },
  })[v] || { t:'—', c:'na', show:false };
}
 
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ─────────────────────────────────────────────────────
(function init() {
  const routeSel = document.getElementById('routeSelect');

  ROUTES.forEach(r => {
    const o = document.createElement('option');
    o.value = r; o.textContent = 'Route ' + r;
    routeSel.appendChild(o);
  });

  try {
    const sr = localStorage.getItem('bt_route');
    if (sr) routeSel.value = sr;
  } catch(e) {}

  state.route = routeSel.value;

  routeSel.addEventListener('change', onRouteChange);

  window.addEventListener('online',  () => { if (state.route) onRouteChange(); });
  window.addEventListener('offline', () => setStatus('offline'));

  // Load holiday overrides first so getDayType() is correct before any
  // schedule/paddle fetch reads it.
  loadCalendarOverrides().then(() => {
    loadPaddleData();
    if (state.route) onRouteChange();
  });
})();
</script>
